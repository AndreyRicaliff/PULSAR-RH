<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pulsar RH — Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#3662FF;--secondary:#A55EFF;--accent:#08C16A;
  --bg:#0E121A;--surface:#1B1F27;--surface2:#252B38;
  --border:#2E3444;--text:#F0F2FF;--muted:#8B9CC0;--orange:#FFBC7D;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* Anéis de pulso no fundo */
.pulse-bg{position:fixed;top:28%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0}
.pulse-ring{position:absolute;top:0;left:0;border-radius:50%;border:1px solid rgba(54,98,255,0.2);transform:translate(-50%,-50%);animation:pulseRing 3.6s ease-out infinite}
.pulse-ring:nth-child(2){animation-delay:1.2s;border-color:rgba(165,94,255,0.15)}
.pulse-ring:nth-child(3){animation-delay:2.4s;border-color:rgba(54,98,255,0.1)}
@keyframes pulseRing{
  0%  {width:80px;height:80px;opacity:.7}
  100%{width:600px;height:600px;opacity:0}
}

/* Partículas flutuantes */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.dot{position:absolute;border-radius:50%;animation:floatDot linear infinite}
@keyframes floatDot{
  0%  {transform:translateY(100vh) scale(0);opacity:0}
  10% {opacity:1}
  90% {opacity:.4}
  100%{transform:translateY(-10vh) scale(1);opacity:0}
}

.login-wrap{width:100%;max-width:440px;padding:16px;position:relative;z-index:1}
.logo-area{text-align:center;margin-bottom:32px}

/* Linha EKG */
.ekg-wrap{display:flex;justify-content:center;margin-bottom:14px}
.ekg-svg{width:180px;height:36px}
.ekg-path{
  fill:none;
  stroke:url(#ekgGrad);
  stroke-width:1.8;
  stroke-linecap:round;
  stroke-linejoin:round;
  stroke-dasharray:260;
  stroke-dashoffset:260;
  animation:ekgDraw 2.2s ease-in-out infinite;
}
@keyframes ekgDraw{
  0%  {stroke-dashoffset:260;opacity:1}
  65% {stroke-dashoffset:0;opacity:1}
  82% {stroke-dashoffset:0;opacity:.5}
  100%{stroke-dashoffset:0;opacity:0}
}

.logo-area h1{
  font-size:26px;font-weight:800;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:logoBreathe 2.2s ease-in-out infinite;
  letter-spacing:-.5px;
}
@keyframes logoBreathe{
  0%,100%{opacity:1;filter:drop-shadow(0 0 0px rgba(54,98,255,0))}
  50%    {opacity:.85;filter:drop-shadow(0 0 12px rgba(54,98,255,.35))}
}
.logo-area p{color:var(--muted);font-size:12px;margin-top:6px}
.made-by-footer{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:2}
.made-by-footer span{font-size:10px;color:var(--muted);opacity:.5;letter-spacing:.8px;text-transform:uppercase}
.made-by-footer strong{color:var(--muted);opacity:.7;font-weight:600;letter-spacing:1px}
.made-by-footer small{display:block;font-size:9px;color:var(--muted);opacity:.35;margin-top:2px;letter-spacing:.4px}

.tabs{display:flex;background:var(--surface2);border-radius:12px;padding:4px;margin-bottom:24px;gap:4px}
.tab{flex:1;padding:10px;text-align:center;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:.2s}
.tab.active{background:var(--primary);color:#fff}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;
  animation:cardPulse 2.2s ease-in-out infinite;
}
@keyframes cardPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(54,98,255,0)}
  50%    {box-shadow:0 0 0 4px rgba(54,98,255,.07)}
}
.form-group{margin-bottom:18px}
label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:.2s}
input:focus{border-color:var(--primary)}
.btn{width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;transition:.2s}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.err{background:#ff444420;border:1px solid #ff4444;border-radius:8px;padding:10px 14px;font-size:13px;color:#ff6666;margin-bottom:16px;display:none}
</style>
</head>
<body>

<!-- Anéis de pulso -->
<div class="pulse-bg">
  <div class="pulse-ring"></div>
  <div class="pulse-ring"></div>
  <div class="pulse-ring"></div>
</div>

<!-- Partículas -->
<div class="particles" id="particles"></div>

<!-- Footer made by -->
<div class="made-by-footer">
  <span>Feito por <strong>AG CONSULTORIA</strong></span>
  <small>Muito além da contabilidade</small>
</div>

<div class="login-wrap">
  <div class="logo-area">
    <!-- Linha de EKG animada -->
    <div class="ekg-wrap">
      <svg class="ekg-svg" viewBox="0 0 180 36">
        <defs>
          <linearGradient id="ekgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#3662FF" stop-opacity="0"/>
            <stop offset="40%"  stop-color="#3662FF" stop-opacity="1"/>
            <stop offset="60%"  stop-color="#A55EFF" stop-opacity="1"/>
            <stop offset="100%" stop-color="#A55EFF" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <polyline class="ekg-path"
          points="0,18 25,18 35,14 42,18 47,4 52,32 57,18 75,18 83,11 90,18 180,18"/>
      </svg>
    </div>
    <h1>PULSAR RH</h1>
    <p>O pulso da sua operação</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="setTab('admin')">Consultoria AG</div>
    <div class="tab" onclick="setTab('client')">Empresa Cliente</div>
  </div>

  <div class="card">
    <div id="err" class="err"></div>
    <div class="form-group">
      <label>E-mail</label>
      <input id="email" type="email" placeholder="seu@email.com"/>
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input id="pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<script>
// Gera partículas flutuantes
(function(){
  const container=document.getElementById('particles');
  const colors=['rgba(54,98,255,','rgba(165,94,255,','rgba(8,193,106,'];
  for(let i=0;i<18;i++){
    const d=document.createElement('div');
    d.className='dot';
    const size=Math.random()*3+1;
    const color=colors[Math.floor(Math.random()*colors.length)];
    d.style.cssText=`
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;
      background:${color}${Math.random()*.5+.2});
      animation-duration:${Math.random()*12+8}s;
      animation-delay:${Math.random()*10}s;
    `;
    container.appendChild(d);
  }
})();

let currentTab='admin';
function setTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>{el.classList.toggle('active',(i===0&&t==='admin')||(i===1&&t==='client'))});
}
function showErr(msg){const e=document.getElementById('err');e.textContent=msg;e.style.display='block'}
function hideErr(){document.getElementById('err').style.display='none'}

const ADMIN_PASS=ADMIN_PASSWORD;

const DEMO_CLIENTS=[
  {email:'rh@tech.com',password:'rh123',name:'Tech Solutions Ltda',id:'client-1',status:'ativo'},
  {email:'rh@varejo.com',password:'rh456',name:'Varejo Nordeste S/A',id:'client-2',status:'ativo'},
  {email:'rh@saude.com',password:'rh789',name:'Clínica Saúde Total',id:'client-3',status:'ativo'},
];

function getStoredClients(){
  try{const c=JSON.parse(localStorage.getItem('ag_clients')||'[]');return c.length?c:DEMO_CLIENTS}catch(e){return DEMO_CLIENTS}
}

function doLogin(){
  hideErr();
  const email=document.getElementById('email').value.trim().toLowerCase();
  const pass=document.getElementById('pass').value;
  if(!email||!pass){showErr('Preencha e-mail e senha.');return}
  if(currentTab==='admin'){
    if(email===ADMIN_EMAIL&&pass===ADMIN_PASS){
      sessionStorage.setItem('ag_role','admin');
      sessionStorage.setItem('ag_user','AG Consultoria');
      window.location.href='/app';
    } else showErr('Credenciais inválidas.');
  } else {
    const clients=getStoredClients();
    const c=clients.find(x=>x.email.toLowerCase()===email&&x.password===pass&&x.status!=='inativo');
    if(c){
      sessionStorage.setItem('ag_role','client');
      sessionStorage.setItem('ag_client_id',c.id);
      sessionStorage.setItem('ag_user',c.name);
      window.location.href='/app';
    } else showErr('Credenciais inválidas.');
  }
}
</script>
</body>
</html>
