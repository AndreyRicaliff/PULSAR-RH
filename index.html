<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pulsar RH — Entrar</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="apple-touch-icon" href="/favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#3662FF;--secondary:#A55EFF;--accent:#08C16A;
  --bg:#0E121A;--surface:#1B1F27;--surface2:#252B38;
  --border:#2E3444;--text:#F0F2FF;--muted:#8B9CC0;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* ── Brilho ambiente único no centro ── */
.ambient{
  position:fixed;
  top:20%;left:50%;
  transform:translate(-50%,-50%);
  width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(54,98,255,.07) 0%, rgba(165,94,255,.04) 40%, transparent 70%);
  pointer-events:none;
  animation:ambientPulse 4s ease-in-out infinite;
}
@keyframes ambientPulse{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:1}
  50%    {transform:translate(-50%,-50%) scale(1.15);opacity:.7}
}

/* ── Anel único de pulso ── */
.pulse-ring{
  position:fixed;
  top:20%;left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  border:1px solid rgba(54,98,255,.18);
  pointer-events:none;
  animation:ringExpand 4s ease-out infinite;
}
.pulse-ring:nth-child(2){animation-delay:1.33s;border-color:rgba(165,94,255,.12)}
.pulse-ring:nth-child(3){animation-delay:2.66s;border-color:rgba(54,98,255,.08)}
@keyframes ringExpand{
  0%  {width:60px;height:60px;opacity:.8}
  100%{width:500px;height:500px;opacity:0}
}

/* ── Conteúdo central ── */
.login-wrap{
  width:100%;max-width:420px;
  padding:16px;
  position:relative;z-index:1;
}

/* ── Logo ── */
.logo-area{text-align:center;margin-bottom:28px}

.ekg-wrap{display:flex;justify-content:center;margin-bottom:16px}
.ekg-svg{width:160px;height:32px}
.ekg-path{
  fill:none;
  stroke:url(#ekgGrad);
  stroke-width:1.6;
  stroke-linecap:round;
  stroke-linejoin:round;
  stroke-dasharray:255;
  stroke-dashoffset:255;
  animation:ekgDraw 3s ease-in-out infinite;
}
@keyframes ekgDraw{
  0%  {stroke-dashoffset:255;opacity:0}
  8%  {opacity:1}
  60% {stroke-dashoffset:0;opacity:1}
  80% {stroke-dashoffset:0;opacity:0}
  100%{stroke-dashoffset:255;opacity:0}
}

.logo-area h1{
  font-size:28px;font-weight:800;letter-spacing:2px;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.logo-area p{
  color:var(--muted);font-size:12px;margin-top:6px;letter-spacing:.3px;
}

/* ── Form ── */
.tabs{display:flex;background:var(--surface2);border-radius:12px;padding:4px;margin-bottom:24px;gap:4px}
.tab{flex:1;padding:10px;text-align:center;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:.2s}
.tab.active{background:var(--primary);color:#fff}

.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px}
.form-group{margin-bottom:18px}
label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:.2s}
input:focus{border-color:var(--primary)}
.btn{width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;transition:.2s}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.err{background:#ff444420;border:1px solid #ff4444;border-radius:8px;padding:10px 14px;font-size:13px;color:#ff6666;margin-bottom:16px;display:none}

/* ── Made by ── */
.made-by-footer{
  position:fixed;bottom:24px;left:0;right:0;
  text-align:center;pointer-events:none;z-index:2;
}
.made-by-inner{
  display:inline-flex;flex-direction:column;align-items:center;gap:5px;
}
.made-by-label{
  font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);opacity:.5;
}
.made-by-logo{
  height:20px;
  filter:brightness(0) invert(1);
  opacity:.9;
  /* tint gradiente via CSS — não suportado nativamente, usamos SVG filter */
}
.made-by-tagline{
  font-size:10px;letter-spacing:.5px;
  background:linear-gradient(90deg,var(--primary),var(--secondary));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  font-weight:500;
}
</style>
</head>
<body>

<!-- Brilho ambiente -->
<div class="ambient"></div>
<div class="pulse-ring"></div>
<div class="pulse-ring"></div>
<div class="pulse-ring"></div>

<!-- Footer made by -->
<div class="made-by-footer">
  <div class="made-by-inner">
    <span class="made-by-label">Feito por</span>
    <img class="made-by-logo" src="/ag-logo.png" alt="AG Consultoria"/>
    <span class="made-by-tagline">Muito além da contabilidade</span>
  </div>
</div>

<div class="login-wrap">
  <div class="logo-area">
    <div class="ekg-wrap">
      <svg class="ekg-svg" viewBox="0 0 160 32">
        <defs>
          <linearGradient id="ekgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#3662FF" stop-opacity="0"/>
            <stop offset="35%"  stop-color="#3662FF" stop-opacity="1"/>
            <stop offset="65%"  stop-color="#A55EFF" stop-opacity="1"/>
            <stop offset="100%" stop-color="#A55EFF" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <polyline class="ekg-path"
          points="0,16 22,16 32,12 38,16 43,3 49,29 54,16 72,16 79,9 86,16 160,16"/>
      </svg>
    </div>
    <h1>PULSAR RH</h1>
    <p>O pulso da sua operação</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="setTab('admin')">Consultoria AG</div>
    <div class="tab" onclick="setTab('client')">Empresa Cliente</div>
  </div>

  <div class="card">
    <div id="err" class="err"></div>
    <div class="form-group">
      <label>E-mail</label>
      <input id="email" type="email" placeholder="seu@email.com"/>
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input id="pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<script>
let currentTab='admin';
function setTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach((el,i)=>{el.classList.toggle('active',(i===0&&t==='admin')||(i===1&&t==='client'))});
}
function showErr(msg){const e=document.getElementById('err');e.textContent=msg;e.style.display='block'}
function hideErr(){document.getElementById('err').style.display='none'}

const ADMIN_PASS=ADMIN_PASSWORD;

const DEMO_CLIENTS=[
  {email:'rh@tech.com',password:'rh123',name:'Tech Solutions Ltda',id:'client-1',status:'ativo'},
  {email:'rh@varejo.com',password:'rh456',name:'Varejo Nordeste S/A',id:'client-2',status:'ativo'},
  {email:'rh@saude.com',password:'rh789',name:'Clínica Saúde Total',id:'client-3',status:'ativo'},
];

function getStoredClients(){
  try{const c=JSON.parse(localStorage.getItem('ag_clients')||'[]');return c.length?c:DEMO_CLIENTS}catch(e){return DEMO_CLIENTS}
}

function doLogin(){
  hideErr();
  const email=document.getElementById('email').value.trim().toLowerCase();
  const pass=document.getElementById('pass').value;
  if(!email||!pass){showErr('Preencha e-mail e senha.');return}
  if(currentTab==='admin'){
    if(email===ADMIN_EMAIL&&pass===ADMIN_PASS){
      sessionStorage.setItem('ag_role','admin');
      sessionStorage.setItem('ag_user','AG Consultoria');
      window.location.href='/app';
    } else showErr('Credenciais inválidas.');
  } else {
    const clients=getStoredClients();
    const c=clients.find(x=>x.email.toLowerCase()===email&&x.password===pass&&x.status!=='inativo');
    if(c){
      sessionStorage.setItem('ag_role','client');
      sessionStorage.setItem('ag_client_id',c.id);
      sessionStorage.setItem('ag_user',c.name);
      window.location.href='/app';
    } else showErr('Credenciais inválidas.');
  }
}
</script>
</body>
</html>
